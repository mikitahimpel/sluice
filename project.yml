name: Sluice
options:
  bundleIdPrefix: com.mikitahimpel
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  SluiceCore:
    path: .

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Sluice:
    type: application
    platform: macOS
    sources:
      - path: Sluice
        excludes:
          - "**/.gitkeep"
    info:
      path: Sluice/App/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        CFBundleDisplayName: Sluice
        CFBundleShortVersionString: "0.1.5"
        CFBundleVersion: "6"
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "Copyright © 2026 Mikita Himpel"
        CFBundleURLTypes:
          - CFBundleURLName: HTTP URL
            CFBundleURLSchemes: [http]
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
          - CFBundleURLName: HTTPS URL
            CFBundleURLSchemes: [https]
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
        CFBundleDocumentTypes:
          - CFBundleTypeName: HTML document
            CFBundleTypeRole: Viewer
            LSItemContentTypes: [public.html, public.xhtml]
            LSHandlerRank: Alternate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikitahimpel.sluice
        PRODUCT_NAME: Sluice
        MARKETING_VERSION: "0.1.5"
        CURRENT_PROJECT_VERSION: "6"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: Sluice/App/Sluice.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: SluiceCore

  SluiceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SluiceTests
    dependencies:
      - target: Sluice
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Sluice.app/Contents/MacOS/Sluice"
        PRODUCT_BUNDLE_IDENTIFIER: com.mikitahimpel.sluice.tests
        GENERATE_INFOPLIST_FILE: YES
